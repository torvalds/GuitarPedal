<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP2350 Pedal Controller</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel">
      <h1>RP2350 Pedal</h1>
      <div class="header-status">
        <button id="update-app-btn" class="status update-btn" title="Fetch latest version">Update App</button>
        <div id="connection-status" class="status disconnected">Disconnected</div>
      </div>

      <div class="global-controls">
        <div class="control-group enable-group">
          <label>Global Enable</label>
          <button class="action-btn" id="global-reset-btn" title="Reset All to Defaults">↺</button>
          <button class="action-btn" id="global-save-btn" title="Save All to EEPROM">💾</button>
          <button class="action-btn" id="global-load-btn" title="Load All from EEPROM">📂</button>
          <label class="switch">
            <input type="checkbox" id="global-enable">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </header>

    <main id="effects-container">
      <!-- Effect cards populated dynamically -->
    </main>

    <!-- Active Pot Panel -->
    <div id="active-pot-panel" class="glass-panel active-pot-panel hidden">
      <div class="active-pot-header">
        <div class="active-pot-info">
          <span id="active-pot-title">Effect - Pot</span>
          <span id="active-pot-value" class="pot-value">0</span>
        </div>
        <button id="close-active-pot" class="action-btn" title="Close">✕</button>
      </div>
      <div class="active-pot-slider-container">
        <input type="range" id="active-pot-slider" class="large-slider" min="0" max="120" value="60">
      </div>
    </div>

  </div>

  <script src="effects.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('ServiceWorker registration successful');
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</body>
</html>
